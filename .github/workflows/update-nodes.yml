name: Update Free Nodes Every Week

on:
  schedule:
    # 对应原设定的每周三 UTC 02:00（北京时间 10:00）
    - cron: '0 2 * * 3'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动更新'

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests pyyaml

    - name: Create output directory
      run: mkdir -p output

    - name: Fetch and process nodes
      run: python scripts/fetch_nodes.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git pull origin main --rebase --autostash
        git add output/

        if git diff --cached --quiet; then
          echo "✅ 没有变更，跳过提交"
          exit 0
        fi

        git commit -m "🔄 Auto update nodes: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
        git push
