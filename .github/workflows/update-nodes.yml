name: Update Free Nodes Every Week

on:
  schedule:
    - cron: '0 2 * * 3'
  workflow_dispatch:

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests pyyaml

    - name: Create output directory
      run: mkdir -p output

    - name: 1. Fetch all raw nodes
      run: python scripts/fetch_nodes.py

    - name: 2. Install Clash Core Speedtester
      run: |
        # 下载成熟的第三方开源 clash 测速二机制工具，用来真实模拟 CONNECT 网络连接
        wget https://github.com/nondanee/clash-speedtest/releases/download/v0.1.3/clash-speedtest-linux-amd64.tar.gz
        tar -zxf clash-speedtest-linux-amd64.tar.gz
        chmod +x clash-speedtest

    - name: 3. Perform Layer 7 Connect Speedtest
      run: |
        # 使用真实的 clash 内核通过真正的本地网络代理通道去 CONNECT Google/Cloudflare 的 204 网页
        # 并设定过滤规则：自动删除不可用或延迟大于 2500 毫秒的死节点，只保留最快的优质节点
        if [ -f "output/nodes.yaml" ]; then
          echo "⚡ 开始通过 Clash 内核连接测试进行层(L7)网络大洗牌..."
          ./clash-speedtest -c output/nodes.yaml -t 2500 -f
          echo "✅ 专业测速过滤清洗完成！"
        else
          echo "❌ 未检测到临时配置文件，跳过测试"
        fi

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git pull origin main --rebase --autostash
        git add output/

        if git diff --cached --quiet; then
          echo "✅ 没有变更，跳过提交"
          exit 0
        fi

        git commit -m "🔄 Auto update nodes via L7 Kernel Speedtest: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
        git push
