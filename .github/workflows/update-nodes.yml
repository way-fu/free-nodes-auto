name: Update Free Nodes Every Week

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:      # ✨ 支持在网页上强制手动刷新！

jobs:
  update-nodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests pyyaml

    - name: Create output directory
      run: mkdir -p output

    - name: Run Fetch and Clean Scripts
      run: python scripts/fetch_nodes.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 🎯【核心修复】必须先将本地临时生成的 25 个节点的文件 add 暂存起来！
        git add output/
        
        # 此时再去拉取并变基，Git 就会以本地暂存的 25 个节点为最高优先级，绝不会被远程旧文件覆盖
        git pull origin main --rebase --autostash

        if git diff --cached --quiet; then
          echo "✅ 没有变更，跳过提交"
          exit 0
        fi

        git commit -m "🔄 Auto update nodes: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
        git push
